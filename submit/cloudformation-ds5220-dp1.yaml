AWSTemplateFormatVersion: '2010-09-09'
Description: >
  DS5220 Data Project 1 - Event-Driven Anomaly Detection Stack.
  Provisions EC2, Security Group, Elastic IP, S3 Bucket, IAM Role/Profile,
  SNS Topic + HTTP Subscription, and S3 Event Notification.


# Parameters
Parameters:

  YourIPAddress:
    Type: String
    Default: "199.111.219.79/32"
    Description: >
      YOUR public IP in CIDR notation for SSH access on port 22,
      e.g. 203.0.113.10/32.
    AllowedPattern: "^(\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
    ConstraintDescription: Must be a valid CIDR block such as 1.2.3.4/32

  S3BucketName:
    Type: String
    Default: "ds5220-dp1-bucket-rna4ts"
    Description: >
      Name for the new S3 bucket (globally unique).
      Named with UVA computing ID: rna4ts

  GitHubRepoURL:
    Type: String
    Default: "https://github.com/tiyeh21/DS-project-1-anomaly-detection-submission-repo.git"
    Description: >
      HTTPS clone URL of YOUR forked anomaly-detection repository.

  EC2KeyPairName:
    Type: AWS::EC2::KeyPair::KeyName
    Default: DS5220
    Description: >
      Name of an existing EC2 Key Pair to enable SSH access to the instance.

# Resources
Resources:

  # S3 Bucket
  AnomalyBucket:
    Type: AWS::S3::Bucket
    DependsOn: SNSTopicPolicy
    Properties:
      BucketName: !Ref S3BucketName
      NotificationConfiguration:
        TopicConfigurations:
          - Event: "s3:ObjectCreated:*"
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: "raw/"
                  - Name: suffix
                    Value: ".csv"
            Topic: !Ref SNSTopic

  # IAM Role & Instance Profile
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-ec2-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3BucketFullAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource:
                  - !Sub "arn:aws:s3:::${S3BucketName}"
                  - !Sub "arn:aws:s3:::${S3BucketName}/*"

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${AWS::StackName}-ec2-profile"
      Roles:
        - !Ref EC2InstanceRole

  # Security Group
  AnomalySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${AWS::StackName}-sg"
      GroupDescription: "Allows SSH from your IP and FastAPI (port 8000) from anywhere"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref YourIPAddress
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: "0.0.0.0/0"

  # EC2 Instance
  AnomalyInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0b6c6ebed2801a5cb
      InstanceType: t3.micro
      KeyName: !Ref EC2KeyPairName
      IamInstanceProfile: !Ref EC2InstanceProfile
      SecurityGroups:
        - !Ref AnomalySecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
            DeleteOnTermination: true
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash
            set -e

            apt-get update -y
            apt-get install -y git python3 python3-pip python3-venv

            git clone ${GitHubRepoURL} /opt/anomaly-detection

            python3 -m venv /opt/anomaly-detection/venv
            /opt/anomaly-detection/venv/bin/pip install --upgrade pip
            /opt/anomaly-detection/venv/bin/pip install -r /opt/anomaly-detection/requirements.txt

            export BUCKET_NAME='${S3BucketName}'
            echo "BUCKET_NAME=${S3BucketName}" >> /etc/environment

            cat > /etc/systemd/system/anomaly-detection.service << 'SYSTEMD_UNIT'
            [Unit]
            Description=Anomaly Detection FastAPI Service
            After=network.target

            [Service]
            User=ubuntu
            WorkingDirectory=/opt/anomaly-detection
            EnvironmentFile=/etc/environment
            ExecStart=/opt/anomaly-detection/venv/bin/fastapi run /opt/anomaly-detection/app.py --host 0.0.0.0 --port 8000
            Restart=always
            RestartSec=5

            [Install]
            WantedBy=multi-user.target
            SYSTEMD_UNIT

            chown -R ubuntu:ubuntu /opt/anomaly-detection

            systemctl daemon-reload
            systemctl enable anomaly-detection
            systemctl start anomaly-detection

      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-anomaly-detection"

  # Elastic IP
  AnomalyEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      InstanceId: !Ref AnomalyInstance
      Tags:
        - Key: Name
          Value: !Sub "${AWS::StackName}-eip"

  # SNS Topic
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  # SNS Topic Policy
  SNSTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref SNSTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3ToPublish
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref SNSTopic
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:s3:::${S3BucketName}"

  # SNS HTTP Subscription
  SNSSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref SNSTopic
      Protocol: http
      Endpoint: !Sub "http://${AnomalyEIP}:8000/notify"

# Outputs
Outputs:

  InstancePublicIP:
    Description: Elastic IP address of the EC2 instance
    Value: !Ref AnomalyEIP

  APIBaseURL:
    Description: Base URL for the FastAPI service
    Value: !Sub "http://${AnomalyEIP}:8000"

  NotifyEndpoint:
    Description: SNS HTTP subscription endpoint
    Value: !Sub "http://${AnomalyEIP}:8000/notify"

  S3BucketName:
    Description: Name of the S3 bucket used by the application
    Value: !Ref AnomalyBucket

  SNSTopicARN:
    Description: ARN of the SNS topic ds5220-dp1
    Value: !Ref SNSTopic

  SSHCommand:
    Description: SSH command to connect to the instance
    Value: !Sub "ssh -i <your-key.pem> ubuntu@${AnomalyEIP}"
